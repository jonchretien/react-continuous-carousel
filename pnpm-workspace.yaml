allowBuilds:
  esbuild: true

blockExoticSubdeps: true

minimumReleaseAge: 1440

trustPolicy: no-downgrade
# continuous-carousel is maintained by the same author; exclude until v1.3.0 is republished with npm provenance
# chokidar, tinyexec, vite@5 (vitepress dep) predate provenance attestation
trustPolicyExclude:
  - continuous-carousel
  - chokidar
  - tinyexec
  - vite
